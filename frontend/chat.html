<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ask a Doubt — AI Neet Mentor</title>

  <!-- Google Fonts — same as index.html -->
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

  <!-- Shared design tokens + base styles from style.css -->
  <link rel="stylesheet" href="style.css" />

  <style>
    /* ============================================================
       CHAT PAGE — Additional Styles
       All design tokens from style.css (:root) are reused here.
       We only add what is unique to this page.
    ============================================================ */

    /* ── Page shell: full-height flex column ── */
    .chat-shell {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Chat-specific header ── */
    .chat-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background-color: rgba(248, 249, 251, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--color-border);
      flex-shrink: 0;
    }
    .chat-header .nav-container {
      max-width: 900px;
    }

    /* Back / logo link */
    .nav-back-btn {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-size: 0.9375rem;
      font-weight: 700;
      font-family: var(--font-headline);
      color: var(--color-primary);
      letter-spacing: -0.02em;
      text-decoration: none;
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-pill);
      transition: background-color 0.2s ease;
    }
    .nav-back-btn:hover {
      background-color: var(--color-surface-card);
    }
    .nav-back-btn .material-symbols-outlined {
      font-size: 1.1rem;
      color: var(--color-text-muted);
    }



    /* ── Scrollable messages ── */
    .chat-messages-area {
      flex: 1;
      overflow-y: auto;
      padding: var(--space-7) var(--space-5);
      scroll-behavior: smooth;
    }
    .chat-messages-area::-webkit-scrollbar { width: 4px; }
    .chat-messages-area::-webkit-scrollbar-track { background: transparent; }
    .chat-messages-area::-webkit-scrollbar-thumb {
      background: var(--color-surface-card);
      border-radius: var(--radius-pill);
    }
    .messages-inner {
      max-width: 760px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: var(--space-6);
    }

    /* ── Welcome / empty state ── */
    .chat-welcome {
      display: flex;
      flex-direction: column;
      gap: var(--space-5);
      animation: fadeUp 0.5s ease both;
    }
    .chat-welcome-row {
      display: flex;
      align-items: flex-start;
      gap: var(--space-4);
    }
    .ai-avatar {
      width: 42px;
      height: 42px;
      border-radius: var(--radius-md);
      background: linear-gradient(135deg, #00346f 0%, #004a99 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: var(--shadow-btn);
    }
    .ai-avatar .material-symbols-outlined {
      color: #fff;
      font-size: 1.25rem;
    }
    .chat-welcome-text { padding-top: 4px; }
    .chat-welcome-text p {
      font-size: 1.125rem;
      line-height: 1.65;
      color: var(--color-text-primary);
    }
    .chat-welcome-badges {
      display: flex;
      gap: var(--space-2);
      margin-top: var(--space-3);
      flex-wrap: wrap;
    }
    .chat-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 12px;
      border-radius: var(--radius-pill);
      font-size: 0.6875rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .chat-badge--teal {
      background-color: rgba(0, 106, 106, 0.1);
      color: var(--color-secondary);
    }
    .chat-badge--navy {
      background-color: var(--color-surface-card);
      color: var(--color-text-muted);
    }


    /* ── PDF Side Panel ── */
    .pdf-panel {
      position: fixed;
      top: 0; right: 0;
      width: 44vw;
      min-width: 340px;
      max-width: 680px;
      height: 100vh;
      background: #fff;
      border-left: 1px solid rgba(0,0,0,0.10);
      box-shadow: -4px 0 24px rgba(0,0,0,0.10);
      display: flex;
      flex-direction: column;
      z-index: 999;
      transform: translateX(100%);
      transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
    }
    .pdf-panel.pdf-panel--open { transform: translateX(0); }
    .pdf-panel-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(0,0,0,0.08);
      flex-shrink: 0;
    }
    .pdf-panel-title {
      flex: 1;
      font-size: 0.8125rem;
      font-weight: 600;
      color: #1a1a2e;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pdf-panel-close {
      background: none;
      border: none;
      cursor: pointer;
      color: #555;
      padding: 4px;
      border-radius: 6px;
      display: flex;
      align-items: center;
    }
    .pdf-panel-close:hover { background: rgba(0,0,0,0.06); }
    .pdf-panel-iframe { flex: 1; border: none; width: 100%; }
    /* Citation box as clickable button */
    .source-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      margin-top: 6px;
      padding: 8px 12px;
      background: rgba(0,52,111,0.06);
      border: none;
      border-left: 3px solid #00346f;
      border-radius: 0 6px 6px 0;
      font-size: 0.8125rem;
      color: #00346f;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      transition: background 0.15s;
    }
    .source-chip:hover { background: rgba(0,52,111,0.13); }
    .source-chip .chip-label { flex: 1; }
    .source-chip .chip-open { font-size: 0.75rem; opacity: 0.5; flex-shrink: 0; transition: opacity 0.15s; }
    .source-chip:hover .chip-open { opacity: 0.9; }
    /* Non-clickable fallback (no PDF file yet) */
    .source-badge {
      display: flex;
      align-items: center;
      width: 100%;
      margin-top: 6px;
      padding: 8px 12px;
      background: rgba(0,52,111,0.04);
      border-left: 3px solid rgba(0,52,111,0.3);
      border-radius: 0 6px 6px 0;
      font-size: 0.8125rem;
      color: #00346f;
    }
    .chat-shell { transition: margin-right 0.28s cubic-bezier(0.4,0,0.2,1); }
    .chat-shell.panel-open { margin-right: 44vw; }
    @media (max-width: 768px) {
      .pdf-panel { width: 100vw; min-width: unset; }
      .chat-shell.panel-open { margin-right: 0; }
    }


    /* ── Quick action chips ── */
    .quick-actions-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-3);
      width: 100%;
    }
    .quick-action-card {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: var(--space-2);
      padding: var(--space-4);
      background-color: var(--color-white);
      border-radius: var(--radius-lg);
      border: 1px solid transparent;
      cursor: pointer;
      text-align: left;
      transition: box-shadow 0.25s ease, border-color 0.25s ease, transform 0.2s ease;
      box-shadow: var(--shadow-card);
    }
    .quick-action-card:hover {
      box-shadow: var(--shadow-card-hover);
      border-color: rgba(194, 198, 211, 0.3);
      transform: translateY(-2px);
    }
    .quick-action-card:active { transform: translateY(0); }
    .quick-action-icon {
      color: var(--color-primary);
      font-size: 1.25rem;
    }
    .quick-action-title {
      font-family: var(--font-headline);
      font-weight: 700;
      font-size: 0.8125rem;
      color: var(--color-primary);
    }
    .quick-action-desc {
      font-size: 0.75rem;
      color: var(--color-text-muted);
      line-height: 1.4;
    }

    /* ── Message bubbles ── */
    .message-row {
      display: flex;
      gap: var(--space-3);
      animation: fadeUp 0.3s ease both;
    }
    .message-row--user { flex-direction: row-reverse; }

    .message-avatar {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-md);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .message-avatar--ai {
      background: linear-gradient(135deg, #00346f 0%, #004a99 100%);
    }
    .message-avatar--ai .material-symbols-outlined { color: #fff; font-size: 1rem; }
    .message-avatar--user { background-color: var(--color-surface-card); }
    .message-avatar--user .material-symbols-outlined { color: var(--color-primary); font-size: 1rem; }

    .message-bubble {
      max-width: 78%;
      padding: var(--space-4) var(--space-5);
      border-radius: var(--radius-lg);
      line-height: 1.65;
      font-size: 0.9375rem;
    }
    .message-bubble--ai {
      background-color: var(--color-white);
      color: var(--color-text-primary);
      box-shadow: var(--shadow-card);
      border-bottom-left-radius: var(--radius-sm);
    }
    .message-bubble--user {
      background: linear-gradient(135deg, #00346f 0%, #004a99 100%);
      color: #fff;
      border-bottom-right-radius: var(--radius-sm);
    }

    /* ── Typing indicator ── */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: var(--space-3) var(--space-4);
      background-color: var(--color-white);
      border-radius: var(--radius-lg);
      border-bottom-left-radius: var(--radius-sm);
      box-shadow: var(--shadow-card);
      width: fit-content;
    }
    .typing-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background-color: var(--color-text-muted);
      animation: typingBounce 1.2s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30%           { transform: translateY(-5px); opacity: 1; }
    }

    /* ── Input bar ── */
    .chat-input-bar {
      flex-shrink: 0;
      background: linear-gradient(to top, var(--color-surface) 60%, transparent);
      padding: var(--space-4) var(--space-5) var(--space-6);
    }
    .chat-input-inner { max-width: 760px; margin: 0 auto; }

    .subject-context-bar {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      flex-wrap: wrap;
      margin-bottom: var(--space-3);
    }
    .subject-context-label {
      font-size: 0.75rem;
      color: var(--color-text-muted);
      font-weight: 500;
    }
    .subject-pill {
      display: inline-flex;
      align-items: center;
      padding: 4px 12px;
      border-radius: var(--radius-pill);
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background-color 0.2s ease, color 0.2s ease;
    }
    .subject-pill--active {
      background-color: var(--color-primary);
      color: #fff;
    }
    .subject-pill--inactive {
      background-color: var(--color-surface-card);
      color: var(--color-text-muted);
    }
    .subject-pill--inactive:hover {
      background-color: rgba(0, 52, 111, 0.08);
      color: var(--color-primary);
    }

    .chat-input-box {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      background-color: var(--color-white);
      border-radius: var(--radius-xl);
      padding: var(--space-2) var(--space-2) var(--space-2) var(--space-5);
      box-shadow: 0 8px 32px rgba(0, 27, 63, 0.08);
      border: 1px solid rgba(194, 198, 211, 0.2);
      transition: box-shadow 0.3s ease, border-color 0.3s ease;
    }
    .chat-input-box:focus-within {
      box-shadow: 0 8px 32px rgba(0, 52, 111, 0.14);
      border-color: rgba(0, 52, 111, 0.2);
    }
    .chat-input-field {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-family: var(--font-body);
      font-size: 0.9375rem;
      color: var(--color-text-primary);
      padding: var(--space-3) 0;
      resize: none;
      line-height: 1.5;
    }
    .chat-input-field::placeholder { color: rgba(66, 71, 81, 0.5); }

    .chat-input-actions {
      display: flex;
      align-items: center;
      gap: var(--space-1);
    }
    .input-icon-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: var(--radius-md);
      border: none;
      background: transparent;
      cursor: pointer;
      color: var(--color-text-muted);
      transition: background-color 0.2s ease, color 0.2s ease;
    }
    .input-icon-btn:hover {
      background-color: var(--color-surface-card);
      color: var(--color-primary);
    }
    .input-icon-btn .material-symbols-outlined { font-size: 1.125rem; }

    .send-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: var(--radius-md);
      border: none;
      background: linear-gradient(135deg, #00346f 0%, #004a99 100%);
      cursor: pointer;
      color: #fff;
      box-shadow: var(--shadow-btn);
      transition: box-shadow 0.2s ease, transform 0.15s ease;
      flex-shrink: 0;
    }
    .send-btn:hover {
      box-shadow: var(--shadow-btn-hover);
      transform: scale(1.05);
    }
    .send-btn:active { transform: scale(0.95); }
    .send-btn .material-symbols-outlined { font-size: 1.125rem; }

    .chat-disclaimer {
      text-align: center;
      font-size: 0.6875rem;
      color: var(--color-text-muted);
      opacity: 0.5;
      margin-top: var(--space-3);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 500;
    }

    /* ── Follow-up question chips ── */
    .followup-row {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      margin-top: var(--space-3);
      padding-left: 44px; /* align with bubble, past avatar */
    }
    .followup-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 14px;
      border-radius: var(--radius-pill);
      border: 1px solid rgba(0, 52, 111, 0.18);
      background: var(--color-white);
      color: var(--color-primary);
      font-size: 0.8125rem;
      font-weight: 600;
      font-family: var(--font-body);
      cursor: pointer;
      transition: background-color 0.2s ease, box-shadow 0.2s ease;
      box-shadow: var(--shadow-card);
    }
    .followup-chip:hover {
      background-color: rgba(0, 52, 111, 0.06);
      box-shadow: var(--shadow-card-hover);
    }
    .followup-chip .material-symbols-outlined {
      font-size: 0.875rem;
      color: var(--color-text-muted);
    }
        /* ── Quick Check chip ── */
    .quickcheck-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 14px;
      border-radius: var(--radius-pill);
      border: 1px solid rgba(0, 106, 106, 0.3);
      background: rgba(0, 106, 106, 0.06);
      color: var(--color-secondary);
      font-size: 0.8125rem;
      font-weight: 700;
      font-family: var(--font-body);
      cursor: pointer;
      transition: background-color 0.2s ease, box-shadow 0.2s ease;
      box-shadow: var(--shadow-card);
    }
    .quickcheck-chip:hover {
      background-color: rgba(0, 106, 106, 0.12);
      box-shadow: var(--shadow-card-hover);
    }
    .quickcheck-chip .material-symbols-outlined {
      font-size: 0.875rem;
    }

    /* ── MCQ Card ── */
    .mcq-card {
      background: var(--color-white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      padding: var(--space-5);
      max-width: 680px;
      animation: fadeUp 0.3s ease both;
    }
    .mcq-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-4);
      padding-bottom: var(--space-3);
      border-bottom: 1px solid var(--color-border);
    }
    .mcq-header-title {
      font-family: var(--font-headline);
      font-weight: 700;
      font-size: 0.9375rem;
      color: var(--color-primary);
    }
    .mcq-progress {
      font-size: 0.75rem;
      color: var(--color-text-muted);
      font-weight: 600;
      background: var(--color-surface-card);
      padding: 3px 10px;
      border-radius: var(--radius-pill);
    }
    .mcq-question-text {
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--color-text-primary);
      line-height: 1.6;
      margin-bottom: var(--space-4);
    }
    .mcq-options {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      margin-bottom: var(--space-4);
    }
    .mcq-option {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-md);
      border: 1.5px solid var(--color-border);
      background: var(--color-surface);
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--color-text-primary);
      transition: border-color 0.2s, background-color 0.2s;
      text-align: left;
      width: 100%;
    }
    .mcq-option:hover:not(:disabled) {
      border-color: rgba(0, 52, 111, 0.3);
      background: rgba(0, 52, 111, 0.04);
    }
    .mcq-option.correct {
      border-color: #16a34a;
      background: rgba(22, 163, 74, 0.08);
      color: #15803d;
      font-weight: 600;
    }
    .mcq-option.wrong {
      border-color: #dc2626;
      background: rgba(220, 38, 38, 0.08);
      color: #b91c1c;
    }
    .mcq-option:disabled { cursor: default; }
    .mcq-option-label {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--color-surface-card);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      flex-shrink: 0;
      color: var(--color-primary);
    }
    .mcq-option.correct .mcq-option-label {
      background: #16a34a;
      color: white;
    }
    .mcq-option.wrong .mcq-option-label {
      background: #dc2626;
      color: white;
    }
    .mcq-explanation {
      padding: var(--space-3) var(--space-4);
      background: rgba(0, 52, 111, 0.05);
      border-left: 3px solid var(--color-primary);
      border-radius: 0 var(--radius-md) var(--radius-md) 0;
      font-size: 0.8125rem;
      color: var(--color-text-primary);
      line-height: 1.6;
      margin-bottom: var(--space-4);
      display: none;
    }
    .mcq-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: var(--space-2);
    }
    .mcq-feedback-text {
      font-size: 0.875rem;
      font-weight: 700;
    }
    .mcq-next-btn {
      display: none;
      align-items: center;
      gap: var(--space-2);
      padding: 8px 18px;
      border-radius: var(--radius-pill);
      border: none;
      background: linear-gradient(135deg, #00346f 0%, #004a99 100%);
      color: #fff;
      font-size: 0.8125rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: var(--shadow-btn);
      transition: box-shadow 0.2s, transform 0.15s;
    }
    .mcq-next-btn:hover {
      box-shadow: var(--shadow-btn-hover);
      transform: scale(1.03);
    }

    /* ── Score card ── */
    .mcq-score-card {
      text-align: center;
      padding: var(--space-6) var(--space-4);
    }
    .mcq-score-emoji {
      font-size: 2.5rem;
      margin-bottom: var(--space-2);
    }
    .mcq-score-number {
      font-family: var(--font-headline);
      font-size: 2.75rem;
      font-weight: 800;
      color: var(--color-primary);
      letter-spacing: -0.03em;
      line-height: 1;
    }
    .mcq-score-label {
      font-size: 0.9375rem;
      color: var(--color-text-muted);
      margin-top: var(--space-2);
      margin-bottom: var(--space-5);
    }
    .mcq-score-actions {
      display: flex;
      gap: var(--space-3);
      justify-content: center;
      flex-wrap: wrap;
    }
    .mcq-fulltest-btn {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: 10px 22px;
      border-radius: var(--radius-pill);
      border: none;
      background: linear-gradient(135deg, #00346f 0%, #004a99 100%);
      color: #fff;
      font-size: 0.875rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: var(--shadow-btn);
      transition: box-shadow 0.2s, transform 0.15s;
    }
    .mcq-fulltest-btn:hover {
      box-shadow: var(--shadow-btn-hover);
      transform: scale(1.02);
    }
    .mcq-retry-btn {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: 10px 22px;
      border-radius: var(--radius-pill);
      border: 1.5px solid rgba(0,52,111,0.2);
      background: transparent;
      color: var(--color-primary);
      font-size: 0.875rem;
      font-weight: 700;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .mcq-retry-btn:hover {
      background: rgba(0,52,111,0.05);
    }


    /* ── Mock Test card above chat ── */




    /* ── Mobile bottom nav (hidden) ── */
    .mobile-bottom-nav { display: none; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .quick-actions-grid { grid-template-columns: repeat(2, 1fr); }

      .chat-input-bar { padding-bottom: 20px; }
    }

    @media (max-width: 480px) {
      .quick-actions-grid { grid-template-columns: 1fr 1fr; }
      .chat-messages-area { padding: var(--space-5) var(--space-4); }
    }
  </style>
</head>

<body>
<div class="chat-shell">

  <!-- ============================================================
    HEADER
    - Logo links back to index.html
    - Mode tabs switch the AI's context (Explain / Doubt / Mock / PYQ)
    - Profile + Settings icons match the home page nav
  ============================================================ -->
  <header class="chat-header">
    <nav class="nav-container">

      <!-- Left: back to home -->
      <a href="index.html" class="nav-back-btn" aria-label="Back to Home">
        <span class="material-symbols-outlined">arrow_back</span>
        AI Neet Mentor
      </a>

      <!-- Right: profile + settings -->
      <div class="nav-actions">
        <button class="nav-icon-btn" aria-label="Profile">
          <span class="material-symbols-outlined">account_circle</span>
        </button>
        <button class="nav-icon-btn" aria-label="Settings">
          <span class="material-symbols-outlined">settings</span>
        </button>
      </div>

    </nav>
  </header>


  <!-- ============================================================
    MOCK TEST BANNER — above the chat
  ============================================================ -->
 

  <!-- ============================================================
    MESSAGES AREA
  ============================================================ -->
  <div class="chat-messages-area" id="messagesArea">
    <div class="messages-inner" id="messagesInner">

      <!-- Welcome / empty state -->

        <div class="chat-welcome-row">
          <div class="ai-avatar">
            <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">auto_stories</span>
          </div>
          <div class="chat-welcome-text">
            <p>Hello! I'm your NCERT-grounded NEET study companion. How can I help you today?</p>
            <div class="chat-welcome-badges">
              <span class="chat-badge chat-badge--teal">
                <span class="material-symbols-outlined" style="font-size:0.75rem;font-variation-settings:'FILL' 1;">verified</span>
                NCERT Verified
              </span>
              <span class="chat-badge chat-badge--navy">NEET 2026 Ready</span>

        </div>

        <!-- Quick action chips -->
        <div class="quick-actions-grid">

          <button class="quick-action-card" onclick="justFocus()">

            <span class="quick-action-title">Topic Explainer</span>
            <span class="quick-action-desc">Simplify complex biology &amp; physics</span>
          </button>

          <button class="quick-action-card" onclick="justFocus()">
            <span class="material-symbols-outlined quick-action-icon" style="font-variation-settings:'FILL' 1;">quiz</span>
            <span class="quick-action-title">Doubt Solver</span>
            <span class="quick-action-desc">Instant answers for tricky MCQs</span>
          </button>

          <button class="quick-action-card" onclick="justFocus()">
            <span class="material-symbols-outlined quick-action-icon" style="font-variation-settings:'FILL' 1;">assignment_turned_in</span>
            <span class="quick-action-title">Mock Test</span>
            <span class="quick-action-desc">Practice full-length papers</span>
          </button>

          <button class="quick-action-card" onclick="justFocus()">
            <span class="material-symbols-outlined quick-action-icon" style="font-variation-settings:'FILL' 1;">analytics</span>
            <span class="quick-action-title">PYQ Analyser</span>
            <span class="quick-action-desc">Trend analysis of previous years</span>
          </button>

        </div>
      </div>
      <!-- end #welcomeState -->

    </div>
  </div>


  <!-- ============================================================
    INPUT BAR
  ============================================================ -->
  <div class="chat-input-bar">
    <div class="chat-input-inner">

      <!-- Subject context pills -->
      <div class="subject-context-bar">
        <span class="subject-context-label">Subject:</span>
        <button class="subject-pill subject-pill--active"   onclick="setSubject(this)">All</button>
        <button class="subject-pill subject-pill--inactive" onclick="setSubject(this)">Biology</button>
        <button class="subject-pill subject-pill--inactive" onclick="setSubject(this)">Physics</button>
        <button class="subject-pill subject-pill--inactive" onclick="setSubject(this)">Chemistry</button>
      </div>

      <div class="chat-input-box">
        <textarea
          id="chatInput"
          class="chat-input-field"
          placeholder="Ask about Human Physiology or organic chemistry…"
          rows="1"
          aria-label="Type your question"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <div class="chat-input-actions">
          <button class="input-icon-btn" aria-label="Attach file">
            <span class="material-symbols-outlined">attachment</span>
          </button>
          <button class="send-btn" onclick="sendMessage()" aria-label="Send message">
            <span class="material-symbols-outlined">arrow_upward</span>
          </button>
        </div>
      </div>

      <p class="chat-disclaimer">
        AI Neet Mentor may provide simplified medical information for educational purposes only.
      </p>

    </div>
  </div>


</div><!-- end .chat-shell -->

<div class="pdf-panel" id="pdfPanel">
  <div class="pdf-panel-header">
    <span class="material-symbols-outlined" style="font-size:1.1rem;font-variation-settings:'FILL' 1;color:#00346f;">menu_book</span>
    <span class="pdf-panel-title" id="pdfPanelTitle">NCERT Source</span>
    <button class="pdf-panel-close" onclick="closePdfPanel()">
      <span class="material-symbols-outlined">close</span>
    </button>
  </div>
  <iframe class="pdf-panel-iframe" id="pdfPanelFrame" src="" title="NCERT PDF"></iframe>
</div>


<script>
  /* ==========================================================================
     FRONTEND JS — Connected to the Flask Backend
     ==========================================================================
     HOW THIS WORKS:
     The frontend was previously using fake simulated replies.
     Now it makes a real HTTP POST request to our Flask API at /api/chat.

     fetch() is the browser's built-in HTTP client.
     It sends JSON to the backend and receives JSON back.

     SESSION MANAGEMENT:
     session_id is a unique string that groups messages in one conversation.
     On first load it's null. The backend creates one and returns it.
     We store it in memory and send it with every subsequent message.
     This gives the AI "memory" within a browser tab session.
  ========================================================================== */

  /* ── State ── */
  let currentMode = 'explain';
  let currentSubject = 'All';
  let sessionId = null;           // Set after first API response

  /* ── Backend URL ──────────────────────────────────────────────────────────
     When running Flask locally: http://127.0.0.1:5000
     When serving frontend FROM Flask (python app.py): just /api/chat works.
     We auto-detect: if this page is served by Flask, use relative URL.
     If opened as a file:// or different port, use the full local URL.
  ── */
  const API_BASE = (
    window.location.protocol === 'file:' || window.location.port === '5500'
  ) ? 'http://127.0.0.1:5000' : '';

  const CHAT_URL = `${API_BASE}/api/chat`;

  function openPdfPanel(filename, page, title) {
    const panel = document.getElementById('pdfPanel');
    const frame = document.getElementById('pdfPanelFrame');
    const label = document.getElementById('pdfPanelTitle');
    const shell = document.querySelector('.chat-shell');
    const pageHash = page && page !== '—' ? `#page=${page}` : '';
    label.textContent = title || filename;
    frame.src = `${API_BASE}/api/pdf/${encodeURIComponent(filename)}${pageHash}`;
    panel.classList.add('pdf-panel--open');
    shell.classList.add('panel-open');
  }

  function closePdfPanel() {
    const panel = document.getElementById('pdfPanel');
    const frame = document.getElementById('pdfPanelFrame');
    const shell = document.querySelector('.chat-shell');
    panel.classList.remove('pdf-panel--open');
    shell.classList.remove('panel-open');
    setTimeout(() => { frame.src = ''; }, 300);
  }

  /* ── Mode placeholders ────────────────────────────────────────────────── */
  const modePlaceholders = {
    explain: 'Ask about any NCERT topic to get a clear explanation…',
    doubt:   'Paste your MCQ or describe your doubt…',
  };

  /* ── Scroll helpers ───────────────────────────────────────────────────── */
  function scrollToBottom() {
    const area = document.getElementById('messagesArea');
    area.scrollTop = area.scrollHeight;
  }

  function hideWelcome() {
    const ws = document.getElementById('welcomeState');
    if (ws) { ws.style.display = 'none'; }
  }

  function formatMarkdown(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code style="background:var(--color-surface-card);padding:2px 6px;border-radius:4px;font-size:0.875em;">$1</code>')
    .replace(/^#{1,3} (.+)$/gm, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
  }

  /* ── Render a message bubble ──────────────────────────────────────────── */
  function appendMessage(text, sender) {
    hideWelcome();
    const inner = document.getElementById('messagesInner');
    const row   = document.createElement('div');
    row.className = `message-row${sender === 'user' ? ' message-row--user' : ''}`;

    const avatar = document.createElement('div');
    if (sender === 'ai') {
      avatar.className = 'message-avatar message-avatar--ai';
      avatar.innerHTML = '<span class="material-symbols-outlined" style="font-variation-settings:\'FILL\' 1;font-size:1rem;">auto_stories</span>';
    } else {
      avatar.className = 'message-avatar message-avatar--user';
      avatar.innerHTML = '<span class="material-symbols-outlined" style="font-size:1rem;">person</span>';
    }

    const bubble = document.createElement('div');
    bubble.className = `message-bubble message-bubble--${sender}`;
    // Replace newlines with <br> so paragraph breaks render correctly.
    bubble.innerHTML = formatMarkdown(text);

    row.appendChild(avatar);
    row.appendChild(bubble);
    inner.appendChild(row);
    scrollToBottom();
  }

  /* ── Typing indicator (3 animated dots) ──────────────────────────────── */
  function showTyping() {
    const inner = document.getElementById('messagesInner');
    const row   = document.createElement('div');
    row.id      = 'typingRow';
    row.className = 'message-row';

    const avatar = document.createElement('div');
    avatar.className = 'message-avatar message-avatar--ai';
    avatar.innerHTML = '<span class="material-symbols-outlined" style="font-variation-settings:\'FILL\' 1;font-size:1rem;">auto_stories</span>';

    const ind = document.createElement('div');
    ind.className = 'typing-indicator';
    ind.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

    row.appendChild(avatar);
    row.appendChild(ind);
    inner.appendChild(row);
    scrollToBottom();
  }

  function hideTyping() {
    const row = document.getElementById('typingRow');
    if (row) row.remove();
  }

  /* ── CORE: Send message to Flask backend ──────────────────────────────── */
  /* ── Mock Test Intent Detection ─────────────────────────────────────── */
  const MOCK_INTENT_PATTERNS = [
    /generate\s+(a\s+)?mock\s+test/i,
    /create\s+(a\s+)?mock\s+test/i,
    /give\s+(me\s+)?(a\s+)?mock\s+test/i,
    /make\s+(a\s+)?mock\s+test/i,
    /mock\s+test\s+on/i,
    /quiz\s+(me\s+)?on/i,
    /test\s+(me\s+)?on/i,
    /practice\s+(test|questions)\s+on/i,
    /\d+\s+questions?\s+on/i,
    /start\s+(a\s+)?(mock\s+)?test/i,
  ];

  function detectMockIntent(text) {
    return MOCK_INTENT_PATTERNS.some(p => p.test(text));
  }

  function extractTopicFromIntent(text) {
    // Try to extract topic after "on" or "about"
    const match = text.match(/(?:on|about|for|of)\s+(.+?)(?:\s*\?|$)/i);
    return match ? match[1].trim() : '';
  }

  function extractCountFromIntent(text) {
    const match = text.match(/(\d+)\s+questions?/i);
    return match ? parseInt(match[1], 10) : null;
  }

  function openMockTestConfig(topic = '', subject = '', count = null) {
    const params = new URLSearchParams();
    if (topic)   params.set('topic', topic);
    if (subject) params.set('subject', subject);
    if (count)   params.set('count', Math.min(50, Math.max(5, count)));
    const url = 'mock-test.html' + (params.toString() ? '?' + params.toString() : '');
    window.location.href = url;
  }

  /* ── Generate follow-up questions after AI response ─────────────────────
   Sends a lightweight second API call asking the LLM to suggest
   3 follow-up questions based on the answer just given.
   Renders them as clickable chips below the last AI bubble.
─────────────────────────────────────────────────────────────────────── */
  async function generateFollowUps(originalQuestion, aiAnswer, sources) {

      // Build NCERT scope string from the actual retrieved sources
      const ncertScope = sources
        .filter(s => s.chapter && s.chapter !== 'NCERT')
        .map(s => `${s.subject} Class ${s.class} — Chapter ${s.chapter_no || ''}: ${s.chapter}`)
        .filter((v, i, arr) => arr.indexOf(v) === i)  // deduplicate
        .join('\n');

      try {
        const prompt = `Based on this NEET study exchange, suggest exactly 3 short follow-up questions a student might ask next.
  Return ONLY a JSON array of 3 strings. No explanation, no markdown, no numbering.
  Example format: ["What is the role of ATP synthase?", "How does the Calvin cycle differ?", "What happens during photolysis?"]

  STRICT RULE: Questions must ONLY be from the NCERT chapters listed below. Do not go outside this scope.

  NCERT chapters used in this answer:
  ${ncertScope || 'General NCERT syllabus — stay within Class 11 and 12 Biology, Physics, Chemistry'}

  Original question: ${originalQuestion}
  AI answer summary: ${aiAnswer.slice(0, 400)}`;

      const response = await fetch(`${API_BASE}/api/followups`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
              question: originalQuestion,
              answer:   aiAnswer.slice(0, 300),
          }),
      });

      const data      = await response.json();
      const questions = data.questions;
      if (!Array.isArray(questions) || questions.length === 0) return;

      // skip the regex parsing entirely — already clean

      // Render chips below the last AI bubble
      const inner = document.getElementById('messagesInner');
      const chipRow = document.createElement('div');
      chipRow.className = 'followup-row';

      questions.slice(0, 3).forEach(q => {
        const chip = document.createElement('button');
        chip.className = 'followup-chip';
        chip.innerHTML = `<span class="material-symbols-outlined">arrow_forward</span>${q}`;
        chip.onclick = () => {
          chipRow.remove();                         // remove chips once one is picked
          document.getElementById('chatInput').value = q;
          sendMessage();                            // send it immediately
        };
        chipRow.appendChild(chip);
      });

  // Add ⚡ Quick Check chip alongside follow-up chips
        const quickChip     = document.createElement('button');
        quickChip.className = 'quickcheck-chip';
        quickChip.innerHTML = '<span class="material-symbols-outlined">bolt</span> Quick Check — 5 Qs';
        quickChip.onclick   = () => startQuickCheck(originalQuestion, currentSubject, chipRow);
        chipRow.appendChild(quickChip);

        inner.appendChild(chipRow);
        scrollToBottom();

    } catch (e) {
      // Silently fail — follow-ups are a nice-to-have, not critical
      console.warn('Follow-up generation failed:', e);
    }
  }

  /* ================================================================
    QUICK CHECK — Inline 5-question MCQ system
    ================================================================ */

  // Global quiz state
  let quizState = {
    questions: [],
    current:   0,
    score:     0,
    topic:     '',
    subject:   '',
  };

  /* ── Step 1: Called when student clicks ⚡ Quick Check chip ── */
  async function startQuickCheck(originalQuestion, subject, chipRow) {

    // Remove chip row immediately so it can't be clicked twice
    if (chipRow) chipRow.remove();

    // Clean up the topic string — strip question words, trim length
    const cleanTopic = originalQuestion
      .replace(/^(explain|what is|what are|describe|tell me about|how does|how do|define)\s+/i, '')
      .replace(/\?$/, '')
      .slice(0, 50)
      .trim();

    showTyping();

    try {
      const prompt = `Generate exactly 5 NEET-style MCQs strictly on: "${cleanTopic}" from NCERT Class 11 or 12 ${subject} syllabus.
  Return ONLY a raw JSON array. No markdown. No explanation. No text before or after the array.

  Format exactly like this:
  [
    {
      "q": "Question text here?",
      "options": ["Option A text", "Option B text", "Option C text", "Option D text"],
      "answer": 0,
      "explanation": "One sentence NCERT-based explanation of why the correct answer is right."
    }
  ]

  Rules:
  - "answer" is the 0-based index of the correct option (0=A, 1=B, 2=C, 3=D)
  - All 4 options must be plausible — three should be common NEET distractors
  - Every question must be traceable to a specific NCERT chapter
  - Difficulty should match actual NEET exam pattern`;

      const response = await fetch(CHAT_URL, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message:    prompt,
          subject:    subject,
          session_id: null,
        }),
      });

      hideTyping();
      if (!response.ok) return;

      const data    = await response.json();
      const raw     = data.answer || '';
      // Strip [ACADEMIC]/[CONVERSATIONAL] tag AND markdown fences
      const cleaned = raw
        .replace(/^\[(ACADEMIC|CONVERSATIONAL)\]/m, '')
        .replace(/```json|```/gi, '')
        .trim();
      const match   = cleaned.match(/\[[\s\S]*\]/);
      if (!match) {
        console.warn('Quick Check: could not parse MCQ JSON', raw);
        return;
      }

      const questions = JSON.parse(match[0]);
      if (!Array.isArray(questions) || questions.length === 0) return;

      // Set global quiz state
      quizState = {
        questions,
        current: 0,
        score:   0,
        topic:   cleanTopic,
        subject: subject,
      };

      renderMCQQuestion();

    } catch (e) {
      hideTyping();
      console.warn('Quick Check failed:', e);
    }
  }

  /* ── Step 2: Render current question ── */
  function renderMCQQuestion() {
    const inner   = document.getElementById('messagesInner');
    const q       = quizState.questions[quizState.current];
    const total   = quizState.questions.length;
    const current = quizState.current + 1;
    const isLast  = current === total;

    // Remove existing card if present
    const existing = document.getElementById('mcqCard');
    if (existing) existing.remove();

    const card = document.createElement('div');
    card.id        = 'mcqCard';
    card.className = 'mcq-card';

    card.innerHTML = `
      <div class="mcq-header">
        <span class="mcq-header-title">
          <span class="material-symbols-outlined" style="font-size:1rem;vertical-align:-2px;">bolt</span>
          Quick Check
        </span>
        <span class="mcq-progress">Q${current} / ${total}</span>
      </div>

      <div class="mcq-question-text">Q${current}. ${q.q}</div>

      <div class="mcq-options">
        ${q.options.map((opt, i) => `
          <button
            class="mcq-option"
            onclick="selectOption(this, ${i})"
            data-index="${i}"
          >
            <span class="mcq-option-label">${['A','B','C','D'][i]}</span>
            ${opt}
          </button>
        `).join('')}
      </div>

      <div class="mcq-explanation" id="mcqExplanation">
        💡 ${q.explanation}
      </div>

      <div class="mcq-nav">
        <span class="mcq-feedback-text" id="mcqFeedback"></span>
        <button class="mcq-next-btn" id="mcqNextBtn" onclick="nextMCQQuestion()">
          ${isLast
            ? 'See Results <span class="material-symbols-outlined" style="font-size:0.875rem;vertical-align:-2px;">emoji_events</span>'
            : 'Next <span class="material-symbols-outlined" style="font-size:0.875rem;vertical-align:-2px;">arrow_forward</span>'
          }
        </button>
      </div>
    `;

    inner.appendChild(card);
    scrollToBottom();
  }

  /* ── Step 3: Handle option click ── */
  function selectOption(btn, selectedIndex) {
    const card       = document.getElementById('mcqCard');
    const allOptions = card.querySelectorAll('.mcq-option');
    const correctIdx = quizState.questions[quizState.current].answer;
    const isCorrect  = selectedIndex === correctIdx;

    // Disable all options
    allOptions.forEach(opt => opt.disabled = true);

    // Highlight correct and wrong
    allOptions[correctIdx].classList.add('correct');
    if (!isCorrect) btn.classList.add('wrong');

    // Update score
    if (isCorrect) quizState.score++;

    // Show feedback
    const feedback    = document.getElementById('mcqFeedback');
    const explanation = document.getElementById('mcqExplanation');
    const nextBtn     = document.getElementById('mcqNextBtn');

    feedback.textContent = isCorrect ? '✅ Correct!' : '❌ Not quite';
    feedback.style.color = isCorrect ? '#16a34a'     : '#dc2626';

    // Show explanation and next button
    explanation.style.display = 'block';
    nextBtn.style.display     = 'flex';

    scrollToBottom();
  }

  /* ── Step 4: Move to next question or score ── */
  function nextMCQQuestion() {
    quizState.current++;

    if (quizState.current >= quizState.questions.length) {
      renderScoreCard();
    } else {
      renderMCQQuestion();
    }
  }

  /* ── Step 5: Show final score card ── */
  function renderScoreCard() {
    const card  = document.getElementById('mcqCard');
    const score = quizState.score;
    const total = quizState.questions.length;
    const pct   = Math.round((score / total) * 100);

    const emoji   = pct === 100 ? '🏆' : pct >= 60 ? '💪' : '📖';
    const message = pct === 100 ? 'Perfect! You nailed it.'
                  : pct >= 80  ? 'Really strong — almost perfect!'
                  : pct >= 60  ? 'Good work — a little more revision needed.'
                  :               'Keep revising — you\'ve got this.';

    card.innerHTML = `
      <div class="mcq-score-card">
        <div class="mcq-score-emoji">${emoji}</div>
        <div class="mcq-score-number">${score}/${total}</div>
        <div class="mcq-score-label">${message}</div>
        <div class="mcq-score-actions">
          <button class="mcq-retry-btn" onclick="retryQuiz()">
            <span class="material-symbols-outlined" style="font-size:1rem;vertical-align:-2px;">refresh</span>
            Retry
          </button>
          <button class="mcq-fulltest-btn" onclick="openMockTestConfig('${quizState.topic}', '${quizState.subject}')">
            <span class="material-symbols-outlined" style="font-size:1rem;vertical-align:-2px;">assignment_turned_in</span>
            Mock Test on this topic
          </button>
        </div>
      </div>
    `;

    scrollToBottom();
  }

  /* ── Retry: reset state and re-render Q1 ── */
  function retryQuiz() {
    quizState.current = 0;
    quizState.score   = 0;
    renderMCQQuestion();

  }

/* ── Parse LLM response type tag ─────────────────────────────────────────
   LLM prefixes every response with [ACADEMIC] or [CONVERSATIONAL].
   We read the tag, strip it, and use it to decide what UI to show.
─────────────────────────────────────────────────────────────────────── */
  function parseResponseType(answer) {
    if (answer.startsWith('[ACADEMIC]')) {
      return {
        isAcademic:  true,
        cleanAnswer: answer.replace('[ACADEMIC]', '').trimStart()
      };
    }
    if (answer.startsWith('[CONVERSATIONAL]')) {
      return {
        isAcademic:  false,
        cleanAnswer: answer.replace('[CONVERSATIONAL]', '').trimStart()
      };
    }
    // LLM forgot the tag — assume academic to be safe
    return {
      isAcademic:  true,
      cleanAnswer: answer
    };
  }

  async function sendMessage() {
    const input = document.getElementById('chatInput');
    const text  = input.value.trim();
    if (!text) return;

    // ── Mock test intent check BEFORE sending to chat API ──
    if (detectMockIntent(text)) {
      const topic   = extractTopicFromIntent(text);
      const count   = extractCountFromIntent(text);
      const subject = currentSubject !== 'All' ? currentSubject : '';
      openMockTestConfig(topic, subject, count);
      return;
    }


    // Show user's message immediately (optimistic UI)
    appendMessage(text, 'user');
    input.value = '';
    autoResize(input);
    showTyping();

    try {
      /*
       * fetch() sends an HTTP POST request to our Flask API.
       * - method: "POST"   → tells the server we're sending data
       * - headers:         → tells Flask the body is JSON
       * - body:            → the actual JSON payload (stringified)
       *
       * await pauses execution here until the response arrives.
       * This is asynchronous — the browser stays responsive while waiting.
       */
      const response = await fetch(CHAT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message:    text,
          subject:    currentSubject,
          session_id: sessionId,     // null on first message, then reused
        }),
      });
      

      hideTyping();

      if (!response.ok) {
        // HTTP error (4xx / 5xx)
        const errData = await response.json().catch(() => ({}));
        appendMessage(
          `⚠️ Error: ${errData.error || 'Something went wrong. Please try again.'}`,
          'ai'
        );
        return;
      }

      /*
       * response.json() parses the JSON body the Flask server returned.
       * data looks like: { answer: "...", sources: [...], session_id: "..." }
       */
      const data = await response.json();
      console.log("API sources:", JSON.stringify(data.sources, null, 2));

      // Save the session_id for all future messages in this tab
      if (data.session_id) sessionId = data.session_id;

    const { isAcademic, cleanAnswer } = parseResponseType(data.answer);

      // Strip any 📖 Source: lines the LLM wrote — we render them as chips below
      const answerText = cleanAnswer.replace(/\n?📖 Source:.*$/gm, '').trimEnd();

      // Render the answer
      appendMessage(answerText, 'ai');

      // Render citation boxes as clickable chips below the answer
      if (isAcademic && data.sources && data.sources.length > 0) {
        const seen = new Set();
        const toShow = [];
        data.sources.forEach(s => {
          // Dedup by subject+chapter only — same chapter on multiple pages = one chip
          const key = `${s.subject}-${s.chapter}`;
          if (!seen.has(key) && s.chapter && s.chapter !== 'NCERT') {
            seen.add(key); toShow.push(s);
          }
        });

        if (toShow.length > 0) {
          const inner      = document.getElementById('messagesInner');
          const allRows    = inner.querySelectorAll('.message-row:not(.message-row--user)');
          const lastBubble = allRows[allRows.length - 1]?.querySelector('.message-bubble');

          if (lastBubble) {
            const wrap = document.createElement('div');
            wrap.style.cssText = 'display:flex;flex-direction:column;gap:0;margin-top:10px;';

            toShow.forEach(s => {
              const page      = s.page_number && s.page_number !== '—' ? s.page_number : '';
              const chNo      = s.chapter_no ? `Chapter ${s.chapter_no}: ` : '';
              const pageLabel = page ? `, Page ${page}` : '';
              const label     = `📖 Source: NCERT ${s.subject} Class ${s.class} — ${chNo}${s.chapter}${pageLabel}`;
              const hasPdf    = s.pdf_filename && s.pdf_filename !== 'demo' && s.pdf_filename.endsWith('.pdf');

              if (hasPdf) {
                const chip = document.createElement('button');
                chip.className = 'source-chip';
                chip.title = `View in NCERT PDF${page ? ' · Page ' + page : ''}`;
                chip.innerHTML = `<span class="chip-label">${label}</span><span class="material-symbols-outlined chip-open">open_in_new</span>`;
                chip.onclick = () => openPdfPanel(
                  s.pdf_filename, page || '1',
                  `NCERT ${s.subject} Class ${s.class} — ${chNo}${s.chapter}`
                );
                wrap.appendChild(chip);
              } else {
                const badge = document.createElement('div');
                badge.className = 'source-badge';
                badge.textContent = label;
                wrap.appendChild(badge);
              }
            });

            lastBubble.appendChild(wrap);
          }
        }
      }

      // Only show follow-ups + Quick Check for academic questions
      if (isAcademic) {
        generateFollowUps(text, cleanAnswer, data.sources || []);
      }

    } catch (networkError) {
      /*
       * This catches network-level failures:
       * - Backend server is not running
       * - No internet connection
       * - CORS blocked (if backend URL is wrong)
       */
      hideTyping();
      appendMessage(
        '⚠️ Could not reach the server. Make sure the Flask backend is running on port 5000.',
        'ai'
      );
      console.error('Network error:', networkError);
    }
  }

  /* ── Keyboard shortcut: Enter to send, Shift+Enter for newline ───────── */
  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  /* ── Auto-resize textarea as user types ──────────────────────────────── */
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 160) + 'px';
  }

  /* ── Quick-action card helpers ───────────────────────────────────────── */
  function prefillAndFocus(text) {
    const input = document.getElementById('chatInput');
    input.value = text;
    autoResize(input);
    input.focus();
  }

  function justFocus() {
    document.getElementById('chatInput').focus();
  }

  /* ── Mode switcher (Explain / Doubt Solver tabs) ─────────────────────── */
  function setMode(btn, mode) {
    currentMode = mode;
    document.querySelectorAll('.nav-mode-tab').forEach(t => t.classList.remove('nav-mode-tab--active'));
    if (btn && btn.classList.contains('nav-mode-tab')) btn.classList.add('nav-mode-tab--active');
    document.querySelectorAll('.mobile-nav-item').forEach(item => {
      item.classList.remove('mobile-nav-item--active');
    });
    if (btn && btn.classList.contains('mobile-nav-item')) btn.classList.add('mobile-nav-item--active');
    document.getElementById('chatInput').placeholder = modePlaceholders[mode] || modePlaceholders.explain;
    document.getElementById('chatInput').focus();
  }

  /* ── Subject pill switcher ───────────────────────────────────────────── */
  function setSubject(btn) {
    document.querySelectorAll('.subject-pill').forEach(p => {
      p.classList.remove('subject-pill--active');
      p.classList.add('subject-pill--inactive');
    });
    btn.classList.add('subject-pill--active');
    btn.classList.remove('subject-pill--inactive');
    // Track the selected subject so it's sent with every API request
    currentSubject = btn.textContent.trim();
  }
</script>

</body>
